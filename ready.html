<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparing | KHU GSB 60th</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #0a0a0a; color: #fff; }
        .gold-gradient {
            background: linear-gradient(135deg, #C5A059 0%, #8E7444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .shimmer {
            background: linear-gradient(90deg, #1a1a1a 25%, #333 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-center">

    <div class="max-w-md w-full">
        <div class="mb-8 inline-block relative">
            <div class="w-20 h-20 border-2 border-[#C5A059]/30 rounded-full flex items-center justify-center mx-auto">
                <span class="text-[#C5A059] text-3xl animate-pulse">!</span>
            </div>
        </div>

        <h1 class="text-3xl font-bold mb-4 gold-gradient">PAGE COMING SOON</h1>
        <p class="text-gray-400 leading-relaxed mb-10">
            현재 해당 페이지는 더 나은 환경을 위해 <br>
            <span class="text-gray-200">디자인 최적화 및 구축 작업 중</span>에 있습니다. <br>
            조금만 기다려 주세요!
        </p>

        <div class="w-full h-1 bg-[#1a1a1a] rounded-full overflow-hidden mb-12">
            <div class="h-full shimmer w-[60%]"></div>
        </div>

        <a href="index.html" class="inline-block px-8 py-3 rounded-full border border-[#C5A059] text-[#C5A059] hover:bg-[#C5A059] hover:text-black transition-all duration-300 font-medium">
            프로젝트 보드로 돌아가기
        </a>

        <p class="mt-12 text-xs text-gray-600 tracking-widest uppercase">
            KHU GSB 60th Digital Lab
        </p>
    </div>

</body>
</html>
